<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&family=Lobster&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:ital,wght@0,700;1,700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Righteous&family=Satisfy&family=Special+Elite&family=Ubuntu:wght@400;700&family=Abril+Fatface&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="editor-wrapper">
    <div class="canvas-area">
      <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
        <div id="textOverlayContainer"></div>
      </div>
      <div class="upload-prompt" id="uploadPrompt">
        <label for="imageUpload">
          <span>＋ Upload Image</span>
          <input type="file" id="imageUpload" accept="image/*" hidden />
        </label>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="filters">Filters</button>
        <button class="tab" data-tab="adjust">Adjust</button>
        <button class="tab" data-tab="text">Text</button>
      </div>

      <!-- FILTERS TAB -->
      <div class="tab-content active" id="tab-filters">
        <div class="filter-grid" id="filterGrid"></div>
      </div>

      <!-- ADJUST TAB -->
      <div class="tab-content" id="tab-adjust">
        <div class="adjust-scroll">

          <!-- Active dial display -->
          <div class="dial-display">
            <canvas id="dialCanvas" width="130" height="130"></canvas>
            <div class="dial-center">
              <span class="dial-value" id="dialValue">0</span>
              <span class="dial-name" id="dialName">Brightness</span>
            </div>
          </div>

          <!-- Slider row for active item -->
          <div class="dial-slider-row">
            <span class="dial-slider-min">-100</span>
            <input type="range" id="activeSlider" min="-100" max="100" value="0" />
            <span class="dial-slider-max">+100</span>
          </div>

          <!-- Adjust items grid -->
          <div class="adjust-grid" id="adjustGrid"></div>

          <!-- Crop / Rotate -->
          <p class="section-label">Crop / Rotate</p>
          <div class="crop-btns">
            <button onclick="rotateImage(-90)">↺ Left</button>
            <button onclick="rotateImage(90)">↻ Right</button>
            <button onclick="flipImage('h')">⇄ Flip H</button>
            <button onclick="flipImage('v')">⇅ Flip V</button>
          </div>
          <div class="aspect-btns">
            <button onclick="setCrop('free')">Free</button>
            <button onclick="setCrop('1:1')">1:1</button>
            <button onclick="setCrop('4:5')">4:5</button>
            <button onclick="setCrop('16:9')">16:9</button>
            <button onclick="setCrop('9:16')">9:16</button>
            <button onclick="setCrop('3:2')">3:2</button>
          </div>
        </div>
      </div>

      <!-- TEXT TAB -->
      <div class="tab-content" id="tab-text">
        <div class="text-controls">
          <input type="text" id="textInput" placeholder="Type your text..." />
          <div class="text-row">
            <label>Size<input type="number" id="fontSize" value="32" min="10" max="200"/></label>
            <label>Color<input type="color" id="fontColor" value="#ffffff"/></label>
          </div>
          <div class="text-row">
            <label>Font
              <select id="fontFamily">
                <optgroup label="System">
                  <option>Arial</option>
                  <option>Georgia</option>
                  <option>Courier New</option>
                  <option>Impact</option>
                  <option>Verdana</option>
                  <option>Times New Roman</option>
                  <option>Trebuchet MS</option>
                  <option>Palatino</option>
                </optgroup>
                <optgroup label="Google Fonts">
                  <option style="font-family:'Abril Fatface'">Abril Fatface</option>
                  <option style="font-family:'Bebas Neue'">Bebas Neue</option>
                  <option style="font-family:'Dancing Script'">Dancing Script</option>
                  <option style="font-family:'Lobster'">Lobster</option>
                  <option style="font-family:'Montserrat'">Montserrat</option>
                  <option style="font-family:'Oswald'">Oswald</option>
                  <option style="font-family:'Pacifico'">Pacifico</option>
                  <option style="font-family:'Permanent Marker'">Permanent Marker</option>
                  <option style="font-family:'Playfair Display'">Playfair Display</option>
                  <option style="font-family:'Raleway'">Raleway</option>
                  <option style="font-family:'Righteous'">Righteous</option>
                  <option style="font-family:'Roboto'">Roboto</option>
                  <option style="font-family:'Satisfy'">Satisfy</option>
                  <option style="font-family:'Special Elite'">Special Elite</option>
                  <option style="font-family:'Ubuntu'">Ubuntu</option>
                </optgroup>
              </select>
            </label>
            <label>Align
              <select id="textAlign">
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </label>
          </div>
          <div class="text-row">
            <label><input type="checkbox" id="textBold"/> Bold</label>
            <label><input type="checkbox" id="textItalic"/> Italic</label>
            <label>Opacity<input type="range" id="textOpacity" min="0" max="100" value="100"/></label>
          </div>
          <button id="addTextBtn" class="btn-primary">Add Text</button>
          <p class="hint">Drag text to reposition. Click once to select — controls update live. Click again to delete.</p>
        </div>
      </div>

      <div class="actions">
        <button onclick="resetAll()" class="btn-secondary">Reset</button>
        <button onclick="downloadImage()" class="btn-primary">Download</button>
        <button onclick="sendToParent()" class="btn-primary" style="background:#7c3aed">Next →</button>
      </div>
    </div>
  </div>

  <script src="editor.js?v=2"></script>
</body>
</html>
